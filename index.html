<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMES - Generador Profesional de Códigos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#e8f5e9,#dcedc8);
    min-height:100vh;
    padding:25px;
}

.container{
    max-width:1600px;
    margin:auto;
    background:white;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.18);
}

.header{
    background:linear-gradient(135deg,#0c5a15,#1d8b2f);
    color:white;
    padding:28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo-icon{
    width:75px;
    height:auto;
    border-radius:50%;
    background:#fff8d5;
    color:#0c5a15;
    display:block;
    object-fit:contain;
    padding:8px;
}

.logo h1{
    font-size:1.9rem;
}

.badge{
    background:rgba(255,255,255,.15);
    padding:12px 18px;
    border-radius:40px;
    font-weight:bold;
}

.content{
    display:flex;
    flex-wrap:wrap;
}

.left{
    flex:1.2;
    padding:30px;
    border-right:1px solid #dbe9d7;
}

.right{
    flex:1;
    padding:30px;
}

.section-title{
    color:#0c5a15;
    font-size:1.25rem;
    font-weight:700;
    margin-bottom:18px;
}

.input-group{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:14px;
    border:2px solid #d8e8d4;
    border-radius:14px;
    font-size:15px;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 18px;
    border-radius:14px;
    font-weight:bold;
    transition:.2s;
}

.btn-green{
    background:#1d8b2f;
    color:white;
}

.btn-green:hover{
    background:#146420;
}

.btn-blue{
    background:#1565c0;
    color:white;
    width:100%;
    margin-top:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:12px;
    max-height:600px;
    overflow:auto;
}

.card{
    background:#fff;
    border:1px solid #e3efe0;
    border-radius:16px;
    padding:14px;
}

.preview{
    min-height:650px;
    background:#fafafa;
    border:2px dashed #d8e8d4;
    border-radius:20px;
    padding:20px;
    overflow:auto;
}

.preview-item{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:18px;
    text-align:center;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}
</style>
</head>
<body>

<div class="container">

<div class="header">
    <div class="logo">
        <img src="https://static.wixstatic.com/media/1724d0_0b595979fe6d498a965f54679c41b97d~mv2.png/v1/fill/w_288,h_225,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/1724d0_0b595979fe6d498a965f54679c41b97d~mv2.png" alt="Logo UMES" class="logo-icon">
        <div>
            <h1>UNIVERSIDAD MESOAMERICANA</h1>
            <p>Sistema Institucional de Escaneo</p>
        </div>
    </div>

    <div class="badge">
        Año: <span id="year"></span>
    </div>
</div>

<div class="content">

<div class="left">

<div class="section-title">
<i class="fas fa-plus-circle"></i> Agregar nuevo código
</div>

<div class="input-group">
    <input id="newCode" placeholder="Ej: Documento_2026_45">
    <button class="btn-green" onclick="addCode()">Agregar</button>
</div>

<div class="section-title">
<i class="fas fa-list"></i> Etiquetas oficiales UMES
</div>

<div class="grid" id="list"></div>

<button class="btn-blue" onclick="generatePDF()">
<i class="fas fa-file-pdf"></i> Descargar PDF
</button>

</div>

<div class="right">
<div class="section-title">
<i class="fas fa-eye"></i> Vista previa
</div>
<div class="preview" id="preview"></div>
</div>

</div>
</div>

<script>
const CURRENT_YEAR = new Date().getFullYear();
document.getElementById("year").textContent = CURRENT_YEAR;

let ITEMS = [
"Inscripcion_2026_1",
"Inscripcion_2026_2",
"Ingles_Maestrias",
"Inscripcion_2026_3",
"Inscripcion_2026_4",
"Identificacion",
"Constancia_admision",
"Carta_compromiso",
"Titulo_nivel_medio",
"Privados",
"Becas",
"Ingles",
"Tesis_Proyecto_Academico",
"Certificaciones_Umes",
"Equivalencias_internas",
"Equivalencias_externas",
"Varios",
"Subsidios",
"Traslados",
"Cambio_Pensum",
"Dirigidos",
"Suficiencias",
"Extraordinarios",
"Retiro",
"Retiro_cursos",
"Revision",
"Resoluciones",
"Cambio_Carrera",
"Certificaciones",
"Practicas",
"Solvencia",
"Cartas_egreso",
"Expediente_graduacion",
"Titulo_Licenciatura_UMES",
"Titulo_Tecnico_UMES",
"Titulo_Maestria_UMES"
];

const selected = new Set();

function normalize(text){
    return '@' + text.replace(/2026/g,CURRENT_YEAR);
}

function getWidth(code){
    if(code.length <= 15) return 4;
    if(code.length <= 25) return 3;
    return 2;
}

function getPdfWidth(code){
    if(code.length <= 15) return 135;
    if(code.length <= 25) return 160;
    return 180;
}

function render(){
    const list=document.getElementById("list");
    list.innerHTML='';

    ITEMS.forEach(item=>{
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <label>
                <input type="checkbox" onchange="toggle('${item}',this.checked)">
                ${normalize(item)}
            </label>
        `;

        list.appendChild(card);
    });
}

function toggle(item,checked){
    checked ? selected.add(item) : selected.delete(item);
    preview();
}

function addCode(){
    const input=document.getElementById("newCode");
    const value=input.value.trim();

    if(!value) return;

    ITEMS.push(value.replace(/\s+/g,"_"));
    input.value="";
    render();
}

function preview(){
    const container=document.getElementById("preview");
    container.innerHTML="";

    selected.forEach(item=>{
        const code=normalize(item);

        const div=document.createElement("div");
        div.className="preview-item";

        const canvas=document.createElement("canvas");

        JsBarcode(canvas,code,{
            format:"CODE128",
            width:getWidth(code),
            height:110,
            displayValue:true,
            fontSize:18,
            margin:20,
            lineColor:"#000",
            background:"#fff"
        });

        div.appendChild(canvas);
        container.appendChild(div);
    });
}

async function generatePDF(){
    if(selected.size===0){
        alert("Selecciona al menos un código.");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let first=true;

    for(const item of selected){

        if(!first) doc.addPage();
        first=false;

        const code=normalize(item);
        const canvas=document.createElement("canvas");

        JsBarcode(canvas,code,{
            format:"CODE128",
            width:getWidth(code)+2,
            height:220,
            displayValue:true,
            fontSize:28,
            margin:30,
            lineColor:"#000",
            background:"#fff"
        });

        const img=canvas.toDataURL("image/png",1);
        const pdfWidth=getPdfWidth(code);
        const x=(210-pdfWidth)/2;

        doc.addImage(img,"PNG",x,15,pdfWidth,55);
    }

    doc.save(`UMES_Codigos_${CURRENT_YEAR}.pdf`);
}

render();
</script>

</body>
</html>
